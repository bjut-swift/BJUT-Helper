name: Auto-assign on claim

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    if: >-
      !github.event.issue.pull_request &&
      (contains(github.event.comment.body, '/claim') || contains(github.event.comment.body, '认领'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Assign commenter
        uses: actions/github-script@v7
        with:
          script: |
            const assignees = context.payload.issue.assignees.map(a => a.login);
            const commenter = context.payload.comment.user.login;
            if (assignees.includes(commenter)) {
              return;
            }
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              assignees: [commenter],
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `👋 @${commenter} 已认领此 issue，加油！`,
            });
